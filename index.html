    function enter() {
  const textarea = document.getElementById("textArea");
  const response = document.getElementById("response");

  
  const text = textarea.value.trim();

  if (text === "") {
    response.innerText = "Box cannot be empty, type in something";
    return;
  }

 
  const words = text.split(/\s+/);


  const validWords = words.filter(word => {
    if (word.length > 1) {
      return true;
    } else if (word === "a" || word === "A" || word === "i" || word === "I") {
      return true;
    } else
    return false;
  });

  const count = validWords.length;

  if (count === 0) {
    response.innerText = "Box cannot be empty, type in something";
  } else if (count === 1) {
    response.innerText =` There is ${count} word in the box`;
  } else {
    response.innerText = `There are ${count} words in the box`;
  }
}
